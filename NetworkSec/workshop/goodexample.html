<html>
<head>
    <title>Good Web Example</title>
</head>
<body>

<button id="btn">Click Me</button>

<script>
    const button = document.getElementById("btn");
    button.addEventListener("click", function () {
        alert("Hello");
    });
</script>

</body>
</html>
// Improvements made:
// 1. Used addEventListener instead of inline event handling
// 2. Separated HTML and JavaScript for better maintainability
// 3. Used an ID selector for better performance and clarity
